<!DOCTYPE html>
<html>
<head><title>Receipt</title></head>
<body>
    <div style="border: 2px dashed black; padding: 20px; width: 300px;">
        <h1>SUPERMARKET BILL</h1>
        <p>Date: <span th:text="${sale.saleDate}"></span></p>
        <hr>
        <p>Item: <span th:text="${sale.productName}"></span></p>
        <p>Qty: <span th:text="${sale.quantitySold}"></span></p>
        <h3>Total: $<span th:text="${sale.totalAmount}"></span></h3>
        <hr>
        <p>Thank you for shopping!</p>
    </div>
    <br>
    <a href="/">Next Customer</a>
</body>
</html>
