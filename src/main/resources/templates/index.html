<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Supermarket Management</title>
</head>
<body>
    <h1>Product Inventory</h1>
    <form th:action="@{/search}" method="get">
        <input type="text" name="keyword" placeholder="Search for a product...">
        <button type="submit">Search</button>
    </form>
    <table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Action</th> </tr>
    </thead>
    <tbody>
        <tr th:each="p : ${listProducts}">
            <td th:text="${p.id}">ID</td>
            <td th:text="${p.name}">Name</td>
            <td th:text="${p.price}">Price</td>
            <td th:text="${p.quantity}">Qty</td>
            <td>
                <form th:action="@{/sell}" method="post">
                    <input type="hidden" name="productId" th:value="${p.id}">
                    <input type="hidden" name="quantity" value="1">
                    <button type="submit" style="background-color: #4CAF50; color: white; cursor: pointer;">
                        Sell 1 Item
                    </button>
                </form>
            </td>
        </tr>
    </tbody>
</table>

    <hr>
    <h3>Add New Product</h3>
    <form th:action="@{/save}" method="post">
        <input type="text" name="name" placeholder="Product Name" required>
        <input type="number" name="price" placeholder="Price" step="0.01" required>
        <input type="number" name="quantity" placeholder="Quantity" required>
        <button type="submit">Add Product</button>
    </form>
</body>
</html>
